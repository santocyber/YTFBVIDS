<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}YTFBVIDS{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body {
        background: #0f0f0f;
        color: #f0f0f0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .navbar {
        background: #1a1a1a !important;
        border-bottom: 1px solid #333;
      }
      .navbar-brand,
      .nav-link {
        color: #fff !important;
      }
      .nav-link:hover {
        color: #ff0066 !important;
      }
      .card {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 12px;
        overflow: hidden;
        transition: 0.2s;
      }
      .card:hover {
        border-color: #ff0066;
        transform: translateY(-2px);
      }
      .card-img-top {
        aspect-ratio: 16/9;
        object-fit: cover;
        background: #000;
      }
      .card-body {
        padding: 1rem;
      }
      .card-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-text {
        font-size: 0.85rem;
        color: #ccc;
      }
      .btn-primary {
        background: #ff0066;
        border: none;
      }
      .btn-primary:hover {
        background: #cc0052;
      }
      .btn-outline-light:hover {
        background: #ff0066;
        border-color: #ff0066;
      }
      .btn-sm {
        font-size: 0.8rem;
      }
      .badge {
        font-weight: 500;
      }
      footer {
        border-top: 1px solid #222;
        color: #666;
        font-size: 0.8rem;
      }
      .empty-state {
        text-align: center;
        padding: 4rem 1rem;
        color: #666;
      }
      .empty-state i {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      video {
        width: 100%;
        border-radius: 8px;
      }
      .form-control,
      .form-control:focus {
        background: #2a2a2a;
        border: 1px solid #444;
        color: #fff;
      }
      .form-control:focus {
        border-color: #ff0066;
        box-shadow: 0 0 0 0.2rem rgba(255, 0, 102, 0.25);
      }
      .modal-content {
        background: #1e1e1e;
        border: 1px solid #333;
      }
      .modal-header {
        border-bottom: 1px solid #333;
      }
      .modal-footer {
        border-top: 1px solid #333;
      }
      .btn-close {
        filter: invert(1);
      }
      a {
        color: #ff0066;
      }
      a:hover {
        color: #ff3388;
      }
      .progress {
        background: #333;
        height: 6px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="bi bi-camera-reels me-2"></i>YTFBVIDS
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"
                ><i class="bi bi-house"></i> Início</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shorts/feed"
                ><i class="bi bi-phone"></i> Feed</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/videos/tv"
                ><i class="bi bi-tv"></i> TV</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/videos"
                ><i class="bi bi-play-circle"></i> Vídeos</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/shorts"
                ><i class="bi bi-scissors"></i> Shorts</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">{% block content %}{% endblock %}</main>

    <footer class="text-center py-3 mt-4">
      YTFBVIDS &mdash; Baixe vídeos e crie Shorts para YouTube, Instagram,
      TikTok
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
